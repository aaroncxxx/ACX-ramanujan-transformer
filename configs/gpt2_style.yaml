# 预训练模型配置：GPT-2 风格

model:
  vocab_size: 50257
  d_model: 768
  nhead: 12
  num_layers: 12
  dim_feedforward: 3072
  dropout: 0.1
  activation: gelu
  max_len: 1024
  decoder_only: true

ramanujan:
  max_depth: 1000
  alpha: 0.3
  lambda_decay: 0.5
  gradient_checkpointing: false
  quantization: none
  long_context_seq_len: 1024

training:
  epochs: 50
  batch_size: 32
  lr: 5.0e-5
  weight_decay: 0.01
  adaptive_weight_decay: true
  warmup_ratio: 0.1
  grad_clip: 1.0
