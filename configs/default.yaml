# ACX-Ramanujan-Transformer 配置 (v1.5)

model:
  vocab_size: 50257
  d_model: 768
  nhead: 12
  num_layers: 12
  dim_feedforward: 3072
  dropout: 0.1
  activation: gelu
  max_len: 2048
  decoder_only: true

# 拉马努金初始化参数
ramanujan:
  max_depth: 1000
  ramanujan_depth: null   # null = 自动计算
  transition_depth: null
  alpha: 0.3
  lambda_decay: 0.5
  gradient_checkpointing: false
  quantization: none      # none / int8 / fp8 / int4
  long_context_seq_len: 512  # >512 启用 RoPE 方差修正

# 训练参数
training:
  epochs: 30
  batch_size: 32
  lr: 3.0e-4
  weight_decay: 0.01
  adaptive_weight_decay: true  # 分层自适应权重衰减
  warmup_ratio: 0.1
  grad_clip: 1.0
  seed: 42

# 数据
data:
  vocab_size: 1000
  num_train_samples: 800
  num_val_samples: 200
  seq_len: 128

# MoE 参数
moe:
  num_experts: 8
  top_k: 2
  capacity_factor: 1.25
  aux_loss_weight: 0.01

# 日志
logging:
  level: INFO    # DEBUG / INFO / WARNING / ERROR
  logger: none   # wandb / tensorboard / none
